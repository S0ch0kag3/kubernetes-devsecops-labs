apiVersion: v1
kind: Pod
metadata:
    name: secure-nginx
    namespace: secure-workloads
spec:
    serviceAccountName: app-serviceaccount
    securityContext:
      runAsNonRoot: true
    containers:
    - name: nginx
      image: nginx:1.25
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
           drop:
             - ALL
