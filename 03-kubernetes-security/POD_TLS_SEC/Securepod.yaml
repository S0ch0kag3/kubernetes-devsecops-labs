apiVersion: v1
kind: Pod
metadata:
    name: secure-nginx
    namespace: dev
spec:
    serviceAccountName: app-service
    securityContext:
       runAsNonRoot: true
       seccompProfile: 
           type: RuntimeDefault
    containers:
      - name: nginx
        image: nginx:1.25
        securityContext:
           allowPrivilegeEscalation: false
           runAsNonRoot: true
           capabilities:
              drop:
                - ALL
